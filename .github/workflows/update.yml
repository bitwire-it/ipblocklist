name: update-list

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 */3 * * *" # UTC

jobs:
  update-list:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.head_ref }}

    - name: Setup directories and download lists
      run: |
        rm -f ip-list-*.txt exclusion_list.txt
        mkdir -p {blocklist-in,blocklist-out,exclusion}
        wget -i urltable-in -P blocklist-in/ --wait 7
        wget -i urltable-out -P blocklist-out/ --wait 7
        wget -i urlexclusion -P exclusion/ --wait 7

    - name: Process IP lists
      run: |
        # Function to process files in a directory
        process_files() {
          local dir=$1
          local output=$2
          
          find "$dir" -type f -exec cat {} \; | 
            sed 's/#.*//; s/;.*//; s/^[[:space:]]*//; s/[[:space:]]*$//; /^$/d' |
            sort -u > "$output"
        }
        
        # Process each directory
        process_files blocklist-in ip-list-in.txt
        process_files blocklist-out ip-list-out.txt
        process_files exclusion exclusion_list.txt
        
        # Clean up directories
        rm -rf blocklist-in blocklist-out exclusion

    - name: Apply exclusions and validate IPs
      run: |
        # Apply exclusions if exclusion list exists
        if [ -f exclusion_list.txt ]; then
          for list in ip-list-in.txt ip-list-out.txt; do
            grep -vFf exclusion_list.txt "$list" | 
              grep -E '^([0-9]{1,3}\.){3}[0-9]{1,3}$' > "${list}.tmp"
            mv "${list}.tmp" "$list"
          done
        fi

    - uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: Update IP list
